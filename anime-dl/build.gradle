plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

version = "0.4.1"

jar {
    manifest {
        attributes("Implementation-Version": project.version)
    }
}

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation libs.junit.jupiter

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation "com.squareup.okhttp3:okhttp:5.4.0"
    implementation "com.squareup.okhttp3:okhttp-urlconnection:5.4.0"
    implementation "com.squareup.okhttp3:logging-interceptor:5.4.0"
    implementation "tools.jackson.core:jackson-core:3.2.0"
    implementation "tools.jackson.core:jackson-databind:3.2.0"
    implementation "info.picocli:picocli:4.7.7"
    implementation "org.slf4j:slf4j-api:2.0.18"
    implementation 'ch.qos.logback:logback-classic:1.5.38'
    implementation "com.github.Abiddarris:Common-Library:0.1.0"

    implementation libs.guava
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }

    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    // Define the main class for the application.
    mainClass = 'com.aabid.animedownloader.Main'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
